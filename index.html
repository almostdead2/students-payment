<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Payment</title>
    <!-- Include html2canvas library for High Quality Image Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #cbd5e1;
            --grid-line: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            color: #0f172a;
            padding-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Top Action Section */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #15803d; }
        
        .btn-outline {
            background-color: transparent;
            color: #475569;
            border: 1px solid #94a3b8;
        }
        .btn-outline:hover {
            background-color: #e2e8f0;
        }

        .export-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Grid Data Table Design */
        .table-responsive {
            overflow-x: auto;
            border: 2px solid var(--grid-line);
            border-radius: 6px;
        }

        #export-area {
            background: white;
            padding: 10px;
        }

        .capture-title {
            display: none;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            background: white;
        }

        th, td {
            padding: 12px 10px;
            border: 1px solid var(--grid-line);
            font-size: 15px;
        }

        th {
            background-color: #e2e8f0;
            font-weight: 700;
            color: #1e293b;
        }

        td:first-child, th:first-child {
            text-align: left;
            font-weight: 600;
            padding-left: 15px;
            background-color: #f8fafc;
            width: 25%;
        }

        /* Checkbox as Grid Tick mark */
        .grid-checkbox {
            position: relative;
            cursor: pointer;
            display: inline-block;
            width: 24px;
            height: 24px;
        }

        .grid-checkbox input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .grid-tick {
            position: absolute;
            top: 0;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: transparent;
            transition: all 0.15s;
        }

        .grid-checkbox:hover input ~ .grid-tick {
            background-color: #e2e8f0;
        }

        .grid-checkbox input:checked ~ .grid-tick {
            background-color: #dcfce7;
            color: var(--success);
            border-color: var(--success);
        }

        .grid-checkbox input:checked ~ .grid-tick::after {
            content: "✓";
        }

        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            padding: 5px 10px;
            border: 1px solid var(--danger);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }

        /* Hide specific elements during Image Export */
        .no-capture {
            display: table-cell;
        }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Student Payment</h1>
    
    <div class="control-panel">
        <!-- Add Student Group -->
        <div class="input-group">
            <input type="text" id="studentName" placeholder="Enter Student Name...">
            <button class="btn" onclick="addStudent()">+ Add Student</button>
        </div>
        
        <!-- Import / Export Actions -->
        <div class="export-group">
            <button class="btn btn-outline" onclick="exportJSON()" title="Download Backup for future edits">💾 Export Data (JSON)</button>
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()" title="Upload previous data to edit">📂 Import Data</button>
            <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
            
            <button class="btn btn-success" onclick="exportToImage()">📸 Export High-Quality Image</button>
        </div>
    </div>

    <!-- Main Grid Workspace -->
    <div id="export-area">
        <div class="capture-title" id="capture-title">Student Payment System Sheet</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Jun</th>
                        <th>Jul</th>
                        <th>Aug</th>
                        <th>Sep</th>
                        <th>Oct</th>
                        <th>Nov</th>
                        <th>Dec</th>
                        <th class="action-column">Action</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const months = ['June', 'July', 'August', 'September', 'October', 'November', 'December'];
    let students = JSON.parse(localStorage.getItem('students_payment_grid')) || [];

    function renderTable() {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        if(students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#64748b; padding:20px;">No student records found. Add students or Import a backup file!</td></tr>`;
            return;
        }

        students.forEach((student, index) => {
            const tr = document.createElement('tr');
            
            // Name Column
            const tdName = document.createElement('td');
            tdName.textContent = student.name;
            tr.appendChild(tdName);

            // Months Columns
            months.forEach(month => {
                const tdMonth = document.createElement('td');
                const label = document.createElement('label');
                label.className = 'grid-checkbox';
                
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.checked = student.payments[month] || false;
                input.onclick = () => togglePayment(index, month);
                
                const span = document.createElement('span');
                span.className = 'grid-tick';
                
                label.appendChild(input);
                label.appendChild(span);
                tdMonth.appendChild(label);
                tr.appendChild(tdMonth);
            });

            // Action Column (Hidden during image export)
            const tdAction = document.createElement('td');
            tdAction.className = 'action-column';
            const btn = document.createElement('button');
            btn.className = 'btn-delete';
            btn.textContent = 'Delete';
            btn.onclick = () => deleteStudent(index);
            tdAction.appendChild(btn);
            tr.appendChild(tdAction);

            tbody.appendChild(tr);
        });
    }

    function addStudent() {
        const input = document.getElementById('studentName');
        const name = input.value.trim();
        if (!name) return;

        const initialPayments = {};
        months.forEach(month => initialPayments[month] = false);

        students.push({ name, payments: initialPayments });
        saveAndRender();
        input.value = '';
    }

    function togglePayment(index, month) {
        students[index].payments[month] = !students[index].payments[month];
        localStorage.setItem('students_payment_grid', JSON.stringify(students));
    }

    function deleteStudent(index) {
        if(confirm(`Are you sure you want to delete ${students[index].name}?`)) {
            students.splice(index, 1);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('students_payment_grid', JSON.stringify(students));
        renderTable();
    }

    // --- JSON BACKUP (EDIT & FUTURE RUNS) ---
    function exportJSON() {
        if(students.length === 0) {
            alert("No data to export!");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(students));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `student_payment_backup_${getFormattedTimestamp()}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importJSON(event) {
        const fileReader = new FileReader();
        fileReader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    students = importedData;
                    saveAndRender();
                    alert("Data Imported Successfully! You can now edit records.");
                } else {
                    alert("Invalid File Format!");
                }
            } catch (err) {
                alert("Error reading file!");
            }
        };
        if(event.target.files[0]) {
            fileReader.readAsText(event.target.files[0]);
        }
    }

    // --- HIGH QUALITY IMAGE EXPORT WITH TIMESTAMP ---
    function getFormattedTimestamp() {
        const date = new Date();
        const monthsShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        
        const day = String(date.getDate()).padStart(2, '0');
        const month = monthsShort[date.getMonth()];
        const year = date.getFullYear();
        
        let hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12; // '0' should be '12'
        
        return `${day}-${month}-${year}_${hours}:${minutes}${ampm}`;
    }

    function exportToImage() {
        if(students.length === 0) {
            alert("Nothing to export as image!");
            return;
        }

        // Hide action columns & show capture headers temporarily
        const actionElements = document.querySelectorAll('.action-column');
        actionElements.forEach(el => el.style.display = 'none');
        const title = document.getElementById('capture-title');
        title.style.display = 'block';

        const exportArea = document.getElementById('export-area');

        // Render at higher scale (2x) for Crystal Clear High-Quality output
        html2canvas(exportArea, {
            scale: 2, 
            backgroundColor: "#ffffff",
            useCORS: true
        }).then(canvas => {
            // Restore hidden layout UI immediately
            actionElements.forEach(el => el.style.display = '');
            title.style.display = 'none';

            // Generate Trigger Download
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = `${getFormattedTimestamp()}.png`;
            link.href = image;
            link.click();
        });
    }

    // Boot
    renderTable();
</script>

</body>
</html>
