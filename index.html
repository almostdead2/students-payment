<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Payment</title>
    <!-- Include html2canvas library for High Quality Image Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #cbd5e1;
            --grid-line: #475569; /* Balanced dark grid line for crystal visibility */
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            color: #0f172a;
            padding-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        /* Perfectly Aligned Control Panel */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin: 20px 0 25px 0;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex: 1;
            min-width: 320px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            background: white;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #15803d; }
        
        .btn-outline {
            background-color: transparent;
            color: #475569;
            border: 1px solid #94a3b8;
        }
        .btn-outline:hover {
            background-color: #e2e8f0;
        }

        .export-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Aligned Grid Table Layout Workspace */
        .table-responsive {
            overflow-x: auto;
            border: 2px solid var(--grid-line);
            border-radius: 8px;
            background: white;
        }

        #export-area {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .capture-title {
            display: none;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 3px solid #000;
            padding-bottom: 8px;
            color: #000;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Mandates rigid column alignments */
            min-width: 1200px; /* Prevents 12 months from breaking visual scales */
        }

        th, td {
            padding: 14px 8px;
            border: 1px solid var(--grid-line);
            font-size: 14px;
            color: #000;
            vertical-align: middle;
            text-align: center;
            box-sizing: border-box;
        }

        th {
            background-color: #cbd5e1;
            font-weight: 700;
        }

        /* Specific rigid widths to prevent alignment shift */
        td:first-child, th:first-child {
            text-align: left;
            font-weight: 700;
            padding-left: 16px;
            background-color: #f8fafc;
            width: 18%; /* Fixed width for names */
        }

        /* Action Column strict bounds */
        .action-column {
            width: 8%;
        }

        /* Perfectly Centered Grid Checkboxes */
        .grid-checkbox {
            position: relative;
            cursor: pointer;
            display: inline-block;
            width: 22px;
            height: 22px;
            margin: 0 auto;
        }

        .grid-checkbox input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .grid-tick {
            position: absolute;
            top: 0;
            left: 0;
            height: 22px;
            width: 22px;
            background-color: #f8fafc;
            border: 1px solid #475569;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
            color: transparent;
            box-sizing: border-box;
        }

        .grid-checkbox:hover input ~ .grid-tick {
            background-color: #e2e8f0;
        }

        .grid-checkbox input:checked ~ .grid-tick {
            background-color: #dcfce7;
            color: var(--success);
            border-color: var(--success);
        }

        .grid-checkbox input:checked ~ .grid-tick::after {
            content: "✓";
        }

        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            padding: 6px 12px;
            border: 1px solid var(--danger);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Student Payment</h1>
    
    <div class="control-panel">
        <!-- Add Student -->
        <div class="input-group">
            <input type="text" id="studentName" placeholder="Enter Student Name...">
            <button class="btn" onclick="addStudent()">+ Add Student</button>
        </div>
        
        <!-- Import / Export Controls -->
        <div class="export-group">
            <button class="btn btn-outline" onclick="exportJSON()" title="Download JSON Backup Data">💾 Export Data (JSON)</button>
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()" title="Load JSON Backup Data">📂 Import Data</button>
            <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
            
            <button class="btn btn-success" onclick="exportToImage()">📸 Export High-Quality Image</button>
        </div>
    </div>

    <!-- Main Dynamic Grid -->
    <div id="export-area">
        <div class="capture-title" id="capture-title">Student Payment Ledger Sheet</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Jan</th>
                        <th>Feb</th>
                        <th>Mar</th>
                        <th>Apr</th>
                        <th>May</th>
                        <th>Jun</th>
                        <th>Jul</th>
                        <th>Aug</th>
                        <th>Sep</th>
                        <th>Oct</th>
                        <th>Nov</th>
                        <th>Dec</th>
                        <th class="action-column">Action</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Javascript injection -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    let students = JSON.parse(localStorage.getItem('students_payment_grid_full')) || [];

    function renderTable() {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        if(students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="14" style="text-align:center; color:#64748b; padding:30px; font-weight: 500;">No student records found. Add students or Import a backup file!</td></tr>`;
            return;
        }

        students.forEach((student, index) => {
            const tr = document.createElement('tr');
            
            // Name Header Alignment
            const tdName = document.createElement('td');
            tdName.textContent = student.name;
            tr.appendChild(tdName);

            // Months Uniform Ticks Alignment
            months.forEach(month => {
                const tdMonth = document.createElement('td');
                const label = document.createElement('label');
                label.className = 'grid-checkbox';
                
                const input = document.createElement('input');
                input.type = 'checkbox';
                if (!student.payments) student.payments = {};
                input.checked = student.payments[month] || false;
                input.onclick = () => togglePayment(index, month);
                
                const span = document.createElement('span');
                span.className = 'grid-tick';
                
                label.appendChild(input);
                label.appendChild(span);
                tdMonth.appendChild(label);
                tr.appendChild(tdMonth);
            });

            // Action Alignment
            const tdAction = document.createElement('td');
            tdAction.className = 'action-column';
            const btn = document.createElement('button');
            btn.className = 'btn-delete';
            btn.textContent = 'Delete';
            btn.onclick = () => deleteStudent(index);
            tdAction.appendChild(btn);
            tr.appendChild(tdAction);

            tbody.appendChild(tr);
        });
    }

    function addStudent() {
        const input = document.getElementById('studentName');
        const name = input.value.trim();
        if (!name) return;

        const initialPayments = {};
        months.forEach(month => initialPayments[month] = false);

        students.push({ name, payments: initialPayments });
        saveAndRender();
        input.value = '';
    }

    function togglePayment(index, month) {
        if (!students[index].payments) students[index].payments = {};
        students[index].payments[month] = !students[index].payments[month];
        localStorage.setItem('students_payment_grid_full', JSON.stringify(students));
    }

    function deleteStudent(index) {
        if(confirm(`Are you sure you want to delete ${students[index].name}?`)) {
            students.splice(index, 1);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('students_payment_grid_full', JSON.stringify(students));
        renderTable();
    }

    function exportJSON() {
        if(students.length === 0) {
            alert("No data to export!");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(students));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `student_payment_backup_${getFormattedTimestamp()}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importJSON(event) {
        const fileReader = new FileReader();
        fileReader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    students = importedData;
                    saveAndRender();
                    alert("Data Imported Successfully!");
                } else {
                    alert("Invalid File Format!");
                }
            } catch (err) {
                alert("Error reading file!");
            }
        };
        if(event.target.files[0]) {
            fileReader.readAsText(event.target.files[0]);
        }
    }

    function getFormattedTimestamp() {
        const date = new Date();
        const monthsShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        
        const day = String(date.getDate()).padStart(2, '0');
        const month = monthsShort[date.getMonth()];
        const year = date.getFullYear();
        
        let hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12;
        
        return `${day}-${month}-${year}_${hours}:${minutes}${ampm}`;
    }

    function exportToImage() {
        if(students.length === 0) {
            alert("Nothing to export as image!");
            return;
        }

        const actionElements = document.querySelectorAll('.action-column');
        actionElements.forEach(el => el.style.display = 'none');
        const title = document.getElementById('capture-title');
        title.style.display = 'block';

        const exportArea = document.getElementById('export-area');

        // Render at massive 4x scaling for maximum crisp quality
        html2canvas(exportArea, {
            scale: 4, 
            backgroundColor: "#ffffff",
            useCORS: true,
            logging: false,
            onclone: (clonedDoc) => {
                const table = clonedDoc.querySelector('table');
                table.style.tableLayout = 'fixed';
                table.style.width = '100%';
            }
        }).then(canvas => {
            actionElements.forEach(el => el.style.display = '');
            title.style.display = 'none';

            const image = canvas.toDataURL("image/png", 1.0);
            const link = document.createElement('a');
            link.download = `${getFormattedTimestamp()}.png`;
            link.href = image;
            link.click();
        }).catch(err => {
            actionElements.forEach(el => el.style.display = '');
            title.style.display = 'none';
            alert("Export failed.");
        });
    }

    renderTable();
</script>

</body>
</html>
