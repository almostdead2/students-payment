<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Payment Tracker (June - Dec)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #22c55e;
            --danger: #ef4444;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #0f172a;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #475569;
        }

        .checkbox-container {
            display: block;
            position: relative;
            padding-left: 25px;
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 20px;
            width: 20px;
            background-color: #cbd5e1;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            background-color: #94a3b8;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--success);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            padding: 6px 12px;
            border: 1px solid var(--danger);
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Student Payment Tracker (June - December)</h1>
    
    <div class="input-section">
        <input type="text" id="studentName" placeholder="Enter Student Name...">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Jun</th>
                    <th>Jul</th>
                    <th>Aug</th>
                    <th>Sep</th>
                    <th>Oct</th>
                    <th>Nov</th>
                    <th>Dec</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <!-- Dynamic rows go here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const months = ['June', 'July', 'August', 'September', 'October', 'November', 'December'];
    let students = JSON.parse(localStorage.getItem('students')) || [];

    function renderTable() {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        students.forEach((student, index) => {
            const tr = document.createElement('tr');
            
            // Name Column
            const tdName = document.createElement('td');
            tdName.textContent = student.name;
            tr.appendChild(tdName);

            // Months Columns
            months.forEach(month => {
                const tdMonth = document.createElement('td');
                const label = document.createElement('label');
                label.className = 'checkbox-container';
                
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.checked = student.payments[month] || false;
                input.onclick = () => togglePayment(index, month);
                
                const span = document.createElement('span');
                span.className = 'checkmark';
                
                label.appendChild(input);
                label.appendChild(span);
                tdMonth.appendChild(label);
                tr.appendChild(tdMonth);
            });

            // Action Column
            const tdAction = document.createElement('td');
            const btn = document.createElement('button');
            btn.className = 'btn-delete';
            btn.textContent = 'Delete';
            btn.onclick = () => deleteStudent(index);
            tdAction.appendChild(btn);
            tr.appendChild(tdAction);

            tbody.appendChild(tr);
        });
    }

    function addStudent() {
        const input = document.getElementById('studentName');
        const name = input.value.trim();
        if (!name) return;

        const initialPayments = {};
        months.forEach(month => initialPayments[month] = false);

        students.push({ name, payments: initialPayments });
        saveAndRender();
        input.value = '';
    }

    function togglePayment(index, month) {
        students[index].payments[month] = !students[index].payments[month];
        localStorage.setItem('students', JSON.stringify(students));
    }

    function deleteStudent(index) {
        if(confirm('Are you sure you want to delete this student?')) {
            students.splice(index, 1);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('students', JSON.stringify(students));
        renderTable();
    }

    // Initial Render
    renderTable();
</script>

</body>
</html>
